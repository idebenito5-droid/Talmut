<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Talmut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --navy:   #0B1F3A;
  --gold:   #B8860B;
  --gold2:  #D4A017;
  --gbord:  rgba(184,134,11,0.35);
  --w:      #ffffff;
  --w60:    rgba(255,255,255,0.6);
  --w30:    rgba(255,255,255,0.3);
  --w10:    rgba(255,255,255,0.08);
  --r:      12px;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--navy);
  color: var(--w);
  font-family: 'Inter', sans-serif;
}

/* ── SCREENS ── */
.screen {
  display: none;
  height: 100vh;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.screen.active { display: flex; }

/* ══════════════════════════════
   HOME
══════════════════════════════ */
#s-home {
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}

.talmut-card {
  width: 100%;
  max-width: 340px;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 1rem 1.25rem;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--gbord);
  border-radius: var(--r);
  cursor: pointer;
  transition: background .15s;
}
.talmut-card:active { background: rgba(184,134,11,0.1); }

.talmut-card img { width: 48px; height: 48px; object-fit: contain; border-radius: 10px; }

.talmut-card-text { flex: 1; }
.talmut-card-text .label { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; letter-spacing: 3px; color: var(--w); }
.talmut-card-text .desc  { font-size: 11px; color: var(--w30); margin-top: 2px; letter-spacing: 1px; }

.talmut-card .arrow { color: var(--gold2); font-size: 20px; }

/* ══════════════════════════════
   SETUP — PLAYER SELECTION
══════════════════════════════ */
#s-setup {
  background: var(--navy);
}

.setup-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: .8rem 1rem;
  border-bottom: .5px solid var(--gbord);
  flex-shrink: 0;
}
.back-btn {
  background: none;
  border: .5px solid var(--w10);
  border-radius: 8px;
  color: var(--w60);
  font-size: 20px;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.setup-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 500;
}

.setup-body {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1rem 1.5rem;
  -webkit-overflow-scrolling: touch;
}

.section-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold2);
  font-weight: 500;
  margin-bottom: .5rem;
  margin-top: .9rem;
}
.section-label:first-child { margin-top: 0; }

/* Preset chips */
.chips-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip {
  padding: 7px 16px;
  border: .5px solid var(--w30);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--w60);
  cursor: pointer;
  transition: all .15s;
  background: transparent;
  font-family: 'Inter', sans-serif;
}
.chip.selected {
  border-color: #E8A000;
  background: rgba(232,160,0,0.15);
  color: #E8A000;
}

/* Custom players */
.custom-list { display: flex; flex-direction: column; gap: 8px; }
.custom-row  { display: flex; align-items: center; gap: 8px; }
.custom-input {
  flex: 1;
  background: var(--w10);
  border: .5px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 9px 14px;
  color: var(--w);
  font-size: 13px;
  font-family: 'Inter', sans-serif;
}
.custom-input:focus { outline: none; border-color: var(--gbord); }
.custom-input::placeholder { color: var(--w30); }
.remove-btn {
  width: 28px; height: 28px;
  background: none;
  border: .5px solid var(--w10);
  border-radius: 50%;
  color: var(--w30);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}
.add-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: .5px dashed var(--w30);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--w30);
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  width: 100%;
  margin-top: 4px;
  transition: all .15s;
}
.add-btn:active { border-color: var(--gold); color: var(--gold); }
.add-btn .plus { font-size: 18px; font-weight: 300; }

/* Selected preview */
.selected-preview {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 28px;
}
.stag {
  font-size: 12px;
  color: var(--w60);
  background: var(--w10);
  border-radius: 12px;
  padding: 3px 10px;
}

/* Start button */
.btn-start {
  width: 100%;
  padding: .9rem;
  background: var(--gold);
  border: none;
  border-radius: var(--r);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  letter-spacing: .5px;
  margin-top: 1.25rem;
  cursor: pointer;
}
.btn-start:active { opacity: .85; }
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen active" id="s-home">
  <button class="talmut-card" onclick="openSetup()">
    <img src="icon.png" alt="Talmut">
    <div class="talmut-card-text">
      <div class="label">TALMUT</div>
      <div class="desc">Partida oficial · 10 rondas</div>
    </div>
    <span class="arrow">›</span>
  </button>
</div>

<!-- ══ SETUP ══ -->
<div class="screen" id="s-setup">
  <div class="setup-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <span class="setup-title">Nueva partida</span>
  </div>
  <div class="setup-body">

    <div class="section-label">Selecciona los jugadores</div>
    <div class="chips-row" id="preset-chips"></div>

    <div class="section-label">Añadir jugador</div>
    <div class="custom-list" id="custom-list"></div>
    <button class="add-btn" id="add-btn" onclick="addCustomField()">
      <span class="plus">+</span> Añadir jugador
    </button>

    <div class="section-label">En juego</div>
    <div class="selected-preview" id="selected-preview"></div>

    <button class="btn-start" onclick="startGame()">Comenzar partida ›</button>

  </div>
</div>

<script>
// ── DATOS ──
var PRESET = [
  { key:'adrian', name:'Adrián' },
  { key:'aleix',  name:'Aleix'  },
  { key:'arnau',  name:'Arnau'  },
  { key:'edu',    name:'Edu'    },
  { key:'marc',   name:'Marc'   },
  { key:'nacho',  name:'Nacho'  },
];

var MAX_CUSTOM = 5;
var selected   = [];   // keys of selected preset players
var customInputs = []; // array of input element references

// ── NAVEGACIÓN ──
function show(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function openSetup() {
  selected     = [];
  customInputs = [];
  document.getElementById('custom-list').innerHTML = '';
  renderChips();
  renderPreview();
  updateAddBtn();
  show('s-setup');
}

function goHome() { show('s-home'); }

// ── CHIPS ──
function renderChips() {
  var wrap = document.getElementById('preset-chips');
  wrap.innerHTML = '';
  PRESET.forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (selected.includes(p.key) ? ' selected' : '');
    btn.textContent = p.name;
    btn.addEventListener('click', function() { toggleChip(p.key); });
    wrap.appendChild(btn);
  });
}

function toggleChip(key) {
  var i = selected.indexOf(key);
  if (i > -1) { selected.splice(i, 1); }
  else         { selected.push(key);    }
  renderChips();
  renderPreview();
}

// ── CAMPOS LIBRES ──
function addCustomField() {
  if (customInputs.length >= MAX_CUSTOM) return;

  var list = document.getElementById('custom-list');
  var row  = document.createElement('div');
  row.className = 'custom-row';

  var inp = document.createElement('input');
  inp.type        = 'text';
  inp.className   = 'custom-input';
  inp.placeholder = 'Nombre del jugador';
  inp.addEventListener('input', renderPreview);

  var del = document.createElement('button');
  del.className   = 'remove-btn';
  del.textContent = '×';
  del.addEventListener('click', function() {
    list.removeChild(row);
    customInputs = customInputs.filter(function(x) { return x !== inp; });
    renderPreview();
    updateAddBtn();
  });

  row.appendChild(inp);
  row.appendChild(del);
  list.appendChild(row);
  customInputs.push(inp);
  inp.focus();
  updateAddBtn();
  renderPreview();
}

function updateAddBtn() {
  var btn = document.getElementById('add-btn');
  btn.style.display = customInputs.length >= MAX_CUSTOM ? 'none' : 'flex';
}

// ── PREVIEW ──
function renderPreview() {
  var all = getAllPlayers();
  var wrap = document.getElementById('selected-preview');
  wrap.innerHTML = all.map(function(n) {
    return '<span class="stag">' + n + '</span>';
  }).join('');
}

function getAllPlayers() {
  var names = selected.map(function(key) {
    return PRESET.find(function(p) { return p.key === key; }).name;
  });
  customInputs.forEach(function(inp) {
    var v = inp.value.trim();
    if (v) names.push(v);
  });
  return names;
}

// ── COMENZAR ──
function startGame() {
  var players = getAllPlayers();
  if (players.length < 2) {
    alert('Selecciona al menos 2 jugadores.');
    return;
  }
  alert('¡A jugar! Jugadores: ' + players.join(', '));
  // Aquí irá la navegación a la siguiente pantalla
}
</script>
</body>
</html>

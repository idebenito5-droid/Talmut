<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Talmut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1F3A;--gold:#B8860B;--gold2:#D4A017;
  --gbord:rgba(184,134,11,0.35);--gbord2:rgba(184,134,11,0.6);
  --w:#fff;--w60:rgba(255,255,255,0.6);--w30:rgba(255,255,255,0.3);--w10:rgba(255,255,255,0.08);
  --green:rgba(39,174,96,0.28);--greentext:#7ddb8a;
  --red:rgba(192,57,43,0.28);--redtext:#f07070;
  --r:12px;
}
html,body{height:100%;overflow:hidden;background:var(--navy);color:var(--w);font-family:'Inter',sans-serif;}

.screen{display:none;height:100vh;flex-direction:column;overflow:hidden;position:relative;}
.screen.active{display:flex;}

/* ── HOME ── */
#s-home{align-items:center;justify-content:flex-start;padding:2.5rem 1.5rem 2rem;}
.home-header{display:flex;flex-direction:column;align-items:center;margin-bottom:2rem;}
.home-logo{width:80px;height:80px;object-fit:contain;border-radius:16px;margin-bottom:.75rem;}
.home-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;letter-spacing:6px;color:var(--w);margin-bottom:.3rem;}
.home-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--w30);}
.home-menu{width:100%;max-width:340px;}
.talmut-card{width:100%;display:flex;align-items:center;gap:14px;padding:1rem 1.25rem;background:rgba(0,0,0,0.25);border:1px solid var(--gbord);border-radius:var(--r);cursor:pointer;transition:background .15s;}
.talmut-card:active{background:rgba(184,134,11,0.1);}
.card-icon{width:44px;height:44px;object-fit:contain;}
.card-label{font-family:'Inter',sans-serif;font-size:17px;font-weight:600;letter-spacing:0;color:#fff;}
.card-desc{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;}
.card-arrow{color:var(--gold2);font-size:20px;margin-left:auto;}

/* ── SETUP ── */
.ph{display:flex;align-items:center;gap:10px;padding:.8rem 1rem;border-bottom:.5px solid var(--gbord);flex-shrink:0;}
.back-btn{background:none;border:.5px solid var(--w10);border-radius:10px;color:var(--w60);font-size:20px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;}
.setup-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:1.25rem 1rem;overflow:hidden;}
.slabel{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--gold2);font-weight:500;margin-bottom:.5rem;margin-top:.9rem;}
.slabel:first-child{margin-top:0;}
.chips-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:6px 14px;border:.5px solid var(--w30);border-radius:14px;font-size:13px;font-weight:500;color:var(--w60);cursor:pointer;background:transparent;font-family:'Inter',sans-serif;transition:all .15s;}
.chip.on{border-color:#E8A000;background:rgba(232,160,0,0.15);color:#E8A000;}
.custom-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
.custom-row{display:flex;align-items:center;gap:8px;}
.custom-input{flex:1;background:var(--w10);border:.5px solid rgba(255,255,255,0.12);border-radius:12px;padding:9px 14px;color:var(--w);font-size:13px;font-family:'Inter',sans-serif;}
.custom-input:focus{outline:none;border-color:var(--gbord);}
.custom-input::placeholder{color:var(--w30);}
.del-btn{width:28px;height:28px;background:none;border:.5px solid var(--w10);border-radius:50%;color:var(--w30);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.add-btn{display:flex;align-items:center;gap:6px;background:none;border:.5px dashed var(--w30);border-radius:12px;padding:8px 14px;color:var(--w30);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-top:4px;}
.add-btn:active{border-color:var(--gold);color:var(--gold);}
.preview{display:flex;flex-wrap:wrap;gap:6px;min-height:24px;}
.stag{font-size:12px;color:var(--w60);background:var(--w10);border-radius:10px;padding:3px 10px;}
.btn-start{width:100%;padding:.9rem;background:var(--gold);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;margin-top:1rem;cursor:pointer;}
.btn-start:active{opacity:.85;}

/* ── FINGER ── */
#s-finger{background:#0B1F3A;}
#finger-arena{position:absolute;inset:0;touch-action:none;user-select:none;-webkit-user-select:none;}
#finger-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
#finger-msg{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:500;color:var(--w);text-align:center;padding:0 2rem;}
#finger-sub{font-size:12px;color:var(--w30);margin-top:.5rem;letter-spacing:1px;text-align:center;}
#finger-start-btn{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:10;padding:.7rem 2.5rem;background:var(--gold);border:none;border-radius:var(--r);color:#fff;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;}
#finger-back-btn{position:absolute;top:14px;left:14px;z-index:10;background:rgba(0,0,0,0.4);border:.5px solid var(--w10);border-radius:8px;color:var(--w60);font-size:20px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* ── GAME ── */
.game-ph{display:flex;align-items:center;gap:10px;padding:.7rem 1rem;border-bottom:.5px solid var(--gbord);flex-shrink:0;}
.game-body{flex:1;display:flex;flex-direction:column;padding:.5rem .75rem 0;overflow:hidden;gap:.5rem;justify-content:center;align-items:stretch;}

/* Score table */
.table-scroll{overflow-x:auto;flex-shrink:0;}
.table-scroll{border-radius:16px;overflow:hidden;border:1px solid var(--gbord2);box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.score-table{border-collapse:collapse;min-width:100%;}
.score-table th{font-size:10px;font-weight:500;color:var(--gold2);padding:5px 0;text-align:center;border:.5px solid var(--gbord);background:rgba(184,134,11,0.12);white-space:nowrap;max-width:44px;}
.score-table th:first-child{color:var(--w30);width:20px;font-size:9px;}
.score-table td{border:.5px solid rgba(184,134,11,0.15);padding:0;text-align:center;}
.score-table td:first-child{font-size:9px;color:var(--w30);padding:3px 3px;}
.score-cell{width:100%;background:transparent;color:var(--w);font-size:12px;text-align:center;padding:10px 0;font-family:'Inter',sans-serif;cursor:pointer;display:block;max-width:44px;border:none;outline:none;-webkit-appearance:none;caret-color:transparent;}
.score-cell.active{background:rgba(184,134,11,0.18);color:var(--gold2);font-weight:600;}
.score-cell.win{background:var(--green);color:var(--greentext);font-weight:600;}
.score-cell.lose{background:var(--red);color:var(--redtext);font-weight:600;}
.tot-row td{padding:4px 2px;font-weight:600;font-size:11px;border-top:1px solid var(--gbord2);border:.5px solid var(--gbord);}
.tot-row td.leader{color:var(--gold2);}

/* Ranking */
.rank-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--gold2);margin-bottom:.3rem;flex-shrink:0;}
.rank-table{width:100%;border-collapse:collapse;border:.5px solid var(--gbord);border-radius:14px;overflow:hidden;flex-shrink:0;}
.rank-table th{font-size:9px;color:var(--gold2);padding:4px 8px;text-transform:uppercase;letter-spacing:.5px;background:rgba(184,134,11,0.12);}
.rank-table td{padding:4px 8px;font-size:12px;border-top:.5px solid rgba(184,134,11,0.08);}

/* Custom keyboard */
#numpad{position:absolute;bottom:0;left:0;right:0;z-index:50;background:#0D2240;border-top:1px solid var(--gbord2);border-radius:16px 16px 0 0;padding:.5rem .75rem .75rem;display:none;}
.numpad-row{display:flex;gap:6px;margin-bottom:6px;justify-content:center;}
.numpad-btn{flex:1;max-width:72px;height:44px;background:rgba(255,255,255,0.07);border:.5px solid rgba(255,255,255,0.12);border-radius:12px;color:var(--w);font-size:18px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.numpad-btn:active{background:rgba(184,134,11,0.25);border-color:var(--gold);}
.numpad-btn.action{background:rgba(184,134,11,0.15);border-color:var(--gbord);color:var(--gold2);}
.numpad-btn.action:active{background:rgba(184,134,11,0.35);}
.numpad-btn.del{background:rgba(255,255,255,0.05);color:var(--w60);}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="home-header">
    <img src="icon.png" alt="Logo" class="home-logo">
    <div class="home-title">TALMUT</div>
    <div class="home-sub">HIC LUDUS ERROREM PUNIT</div>
  </div>
  <div class="home-menu">
    <button class="talmut-card" onclick="openSetup()">
      <img src="Talmut.png" alt="Talmut" class="card-icon">
      <div style="flex:1;text-align:left">
        <div class="card-label">Talmut</div>
        <div class="card-desc">Partida oficial · 10 rondas</div>
      </div>
      <span class="card-arrow">›</span>
    </button>
  </div>
</div>

<!-- SETUP -->
<div class="screen" id="s-setup">
  <div class="ph">
    <button class="back-btn" onclick="goBack()">‹</button>
    <span class="ph-title">Nueva partida</span>
  </div>
  <div class="setup-body">
    <div class="slabel">Selecciona los jugadores</div>
    <div class="chips-row" id="preset-chips"></div>
    <div class="slabel">Añadir jugador</div>
    <div class="custom-list" id="custom-list"></div>
    <button class="add-btn" id="add-btn" onclick="addCustom()">
      <span style="font-size:18px;font-weight:300">+</span> Añadir jugador
    </button>
    <div class="slabel">En juego</div>
    <div class="preview" id="preview"></div>
    <button class="btn-start" onclick="startGame()">Comenzar partida ›</button>
  </div>
</div>

<!-- FINGER -->
<div class="screen" id="s-finger">
  <button id="finger-back-btn" onclick="goBack()">‹</button>
  <div id="finger-arena"></div>
  <div id="finger-center">
    <div id="finger-msg">Poned los dedos</div>
    <div id="finger-sub">Toca la pantalla para iniciar</div>
  </div>
  <button id="finger-start-btn" onclick="startCountdown()">Iniciar cuenta atrás</button>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <div class="game-ph">
    <button class="back-btn" onclick="confirmLeave()">‹</button>
    <span class="ph-title">Talmut &nbsp;<span style="font-size:9px;color:var(--w30);letter-spacing:1px;text-transform:uppercase">Oficial · 10 rondas</span></span>
  </div>
  <div class="game-body">
    <div class="table-scroll">
      <table class="score-table" id="score-table"></table>
    </div>
    <div class="rank-label" style="margin-top:.5rem">Clasificación</div>
    <table class="rank-table">
      <thead><tr>
        <th style="width:22px;text-align:left">#</th>
        <th style="text-align:left">Jugador</th>
        <th>Pts</th><th>Dif</th>
      </tr></thead>
      <tbody id="rank-body"></tbody>
    </table>
  </div>
  <!-- Custom numpad -->
  <div id="numpad">
    <div class="numpad-row">
      <button class="numpad-btn" onclick="numInput('7')">7</button>
      <button class="numpad-btn" onclick="numInput('8')">8</button>
      <button class="numpad-btn" onclick="numInput('9')">9</button>
    </div>
    <div class="numpad-row">
      <button class="numpad-btn" onclick="numInput('4')">4</button>
      <button class="numpad-btn" onclick="numInput('5')">5</button>
      <button class="numpad-btn" onclick="numInput('6')">6</button>
    </div>
    <div class="numpad-row">
      <button class="numpad-btn" onclick="numInput('1')">1</button>
      <button class="numpad-btn" onclick="numInput('2')">2</button>
      <button class="numpad-btn" onclick="numInput('3')">3</button>
    </div>
    <div class="numpad-row">
      <button class="numpad-btn del" onclick="numDel()">⌫</button>
      <button class="numpad-btn" onclick="numInput('0')">0</button>
      <button class="numpad-btn action" onclick="numNext()">→</button>
    </div>
  </div>
</div>

<script>
// ═══════ CONSTANTES ═══════
var PRESET = [
  {key:'adrian',name:'Adrián'},{key:'aleix',name:'Aleix'},
  {key:'arnau',name:'Arnau'},{key:'edu',name:'Edu'},
  {key:'marc',name:'Marc'},{key:'nacho',name:'Nacho'}
];
var AUDIO_FILES = [
  'bastardo.mp3','basura_feo.mp3','billy.mp3','choza.mp3','doblaos.mp3',
  'frances.mp3','gij_rojbla.mp3','juego_entero.mp3','kkk.mp3','mlg_blaazu.mp3',
  'osasuna.mp3','parche_hdp.mp3','parches_ofi.mp3','peinaguindillas.mp3',
  'pes_verdad.mp3','porra.mp3','rasgaprepucios.mp3','september.mp3',
  'siuuu.mp3','tiki_taka.mp3','cerdo_mixta.mp3','palo.mp3','pitapita.mp3',
  'maraton.mp3','rocas.mp3','Fieshta.mp3','africa.mp3','helikopter.mp3',
  'Da\u00f1o_Tio.mp3','Mosca_Fanta.mp3','Fanta1.mp3','esperare.m4a',
  'oso_caja.mp3','Caja.mp3','Vodka.mp3','Groove.m4a','Huele_Raro.mp3',
  'Cara_Al_Sol.mp3','Pedro1.mp3','Stelio_Kontos.mp3','avengers.mp3','MARC.mp3',
  'Rubiales.mp3','Curazao.mp3','Cilantro.mp3','negros.mp3','lavate_manos.mp3'
];
var FINGER_COLORS = ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E67E22','#E91E63'];
var TOTAL_ROUNDS = 10;

// ═══════ ESTADO ═══════
var selected     = [];
var customInputs = [];
var gamePlayers  = [];
var scoreValues  = []; // scoreValues[player][round] = string

// Finger
var fingerPhase     = 'idle';
var fingerTouches   = {};
var fingerTimer     = null;
var fingerCountdown = null;

// Audio
var audioQueue   = [];
var currentAudio = null;

// Numpad
var activeCell    = null; // {row, col}
var cellOrder     = [];   // [{row,col}] ordered list

// ═══════ NAVEGACIÓN CON BOTÓN ATRÁS ═══════
var screenHistory = ['s-home'];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  screenHistory.push(id);
  history.pushState({screen:id}, '', '');
}

function goBack() {
  if (screenHistory.length > 1) {
    screenHistory.pop();
    var prev = screenHistory[screenHistory.length - 1];
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(prev).classList.add('active');
  }
}

window.addEventListener('popstate', function(e) {
  var cur = screenHistory[screenHistory.length - 1];
  if (cur === 's-game') {
    if (!confirm('¿Salir de la partida? Se perderán los datos.')) {
      history.pushState({screen:'s-game'}, '', '');
      return;
    }
  }
  goBack();
});

// ═══════ AUDIO ═══════
function shuffleQueue() {
  audioQueue = AUDIO_FILES.slice();
  for (var i = audioQueue.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = audioQueue[i]; audioQueue[i]=audioQueue[j]; audioQueue[j]=t;
  }
}
shuffleQueue();

function playAudio() {
  if (currentAudio){ currentAudio.pause(); currentAudio=null; }
  if (!audioQueue.length) shuffleQueue();
  var f = audioQueue.pop();
  currentAudio = new Audio(f);
  currentAudio.volume = 1.0;
  var p = currentAudio.play();
  if (p && p.catch) p.catch(function(){});
}

// ═══════ SETUP ═══════
function openSetup() {
  selected=[]; customInputs=[];
  document.getElementById('custom-list').innerHTML='';
  renderChips(); renderPreview(); updateAddBtn();
  showScreen('s-setup');
}

function renderChips() {
  var wrap = document.getElementById('preset-chips');
  wrap.innerHTML='';
  PRESET.forEach(function(p){
    var btn = document.createElement('button');
    btn.className='chip'+(selected.includes(p.key)?' on':'');
    btn.textContent=p.name;
    btn.addEventListener('click',function(){ toggleChip(p.key); });
    wrap.appendChild(btn);
  });
}

function toggleChip(key) {
  playAudio();
  var i=selected.indexOf(key);
  if(i>-1){ selected.splice(i,1); } else { selected.push(key); }
  renderChips(); renderPreview();
}

function addCustom() {
  if(customInputs.length>=5) return;
  var list=document.getElementById('custom-list');
  var row=document.createElement('div'); row.className='custom-row';
  var inp=document.createElement('input'); inp.type='text'; inp.className='custom-input'; inp.placeholder='Nombre del jugador';
  inp.addEventListener('input',renderPreview);
  var del=document.createElement('button'); del.className='del-btn'; del.textContent='×';
  del.addEventListener('click',function(){
    list.removeChild(row);
    customInputs=customInputs.filter(function(x){return x!==inp;});
    renderPreview(); updateAddBtn();
  });
  row.appendChild(inp); row.appendChild(del); list.appendChild(row);
  customInputs.push(inp); inp.focus();
  updateAddBtn(); renderPreview();
}

function updateAddBtn(){
  document.getElementById('add-btn').style.display=customInputs.length>=5?'none':'flex';
}

function getAllPlayers(){
  var names=selected.map(function(k){ return PRESET.find(function(p){return p.key===k;}).name; });
  customInputs.forEach(function(inp){ var v=inp.value.trim(); if(v) names.push(v); });
  return names;
}

function renderPreview(){
  document.getElementById('preview').innerHTML=getAllPlayers().map(function(n){
    return '<span class="stag">'+n+'</span>';
  }).join('');
}

// ═══════ INICIO → DEDOS ═══════
function startGame(){
  var players=getAllPlayers();
  if(players.length<2){ alert('Selecciona al menos 2 jugadores.'); return; }
  gamePlayers=players.map(function(n){return{name:n};});
  scoreValues=gamePlayers.map(function(){ return Array(TOTAL_ROUNDS).fill(''); });
  openFinger();
}

// ═══════ DEDO ═══════
function openFinger(){
  fingerPhase='idle'; fingerTouches={};
  clearTimeout(fingerTimer); clearInterval(fingerCountdown);
  fingerTimer=null; fingerCountdown=null;

  var arena=document.getElementById('finger-arena');
  arena.innerHTML=''; arena.style.background='var(--navy)';

  var msg=document.getElementById('finger-msg');
  msg.style.fontSize='32px'; msg.style.fontFamily="'Cormorant Garamond',serif";
  msg.style.color='#fff'; msg.textContent='Poned los dedos';
  document.getElementById('finger-sub').textContent='Toca la pantalla para iniciar';
  document.getElementById('finger-start-btn').style.display='block';
  document.getElementById('finger-back-btn').style.display='flex';

  showScreen('s-finger');

  // Quitar listeners anteriores clonando el elemento
  var oldArena=arena;
  var newArena=oldArena.cloneNode(false);
  oldArena.parentNode.replaceChild(newArena, oldArena);
  newArena.addEventListener('touchstart', onTouchStart, {passive:false});
  newArena.addEventListener('touchmove',  onTouchMove,  {passive:false});
  newArena.addEventListener('touchend',   onTouchEnd,   {passive:false});
  newArena.addEventListener('touchcancel',onTouchEnd,   {passive:false});
}

function onTouchStart(e){
  e.preventDefault();
  if(fingerPhase!=='active') return;
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(!fingerTouches[t.identifier]){
      var ci=Object.keys(fingerTouches).length%FINGER_COLORS.length;
      fingerTouches[t.identifier]={x:t.clientX,y:t.clientY,color:FINGER_COLORS[ci]};
    }
  }
  renderDots();
}

function onTouchMove(e){
  e.preventDefault();
  if(fingerPhase!=='active') return;
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(fingerTouches[t.identifier]){
      fingerTouches[t.identifier].x=t.clientX;
      fingerTouches[t.identifier].y=t.clientY;
    }
  }
  renderDots();
}

function onTouchEnd(e){
  e.preventDefault();
  if(fingerPhase!=='active') return;
  for(var i=0;i<e.changedTouches.length;i++){
    delete fingerTouches[e.changedTouches[i].identifier];
  }
  renderDots();
}

function renderDots(){
  var arena=document.getElementById('finger-arena');
  arena.innerHTML='';
  Object.keys(fingerTouches).forEach(function(k){
    var t=fingerTouches[k];
    var dot=document.createElement('div');
    dot.style.cssText='position:absolute;width:64px;height:64px;border-radius:50%;background:'+t.color+';opacity:0.85;pointer-events:none;transform:translate(-50%,-50%);left:'+t.x+'px;top:'+t.y+'px;';
    arena.appendChild(dot);
  });
}

function startCountdown(){
  document.getElementById('finger-start-btn').style.display='none';
  document.getElementById('finger-back-btn').style.display='none';
  fingerPhase='countdown';
  var count=3;
  var msg=document.getElementById('finger-msg');
  var sub=document.getElementById('finger-sub');
  msg.style.fontSize='140px'; msg.style.fontFamily='Arial,sans-serif';
  msg.style.fontWeight='900'; msg.style.color='#fff';
  msg.textContent='3'; sub.textContent='';
  fingerCountdown=setInterval(function(){
    count--;
    if(count>0){ msg.textContent=String(count); }
    else{
      clearInterval(fingerCountdown);
      document.getElementById('finger-arena').style.background='#000';
      msg.textContent=''; sub.textContent='';
      fingerPhase='active';
      fingerTimer=setTimeout(pickWinner,5000);
    }
  },1000);
}

function pickWinner(){
  fingerPhase='result';
  var keys=Object.keys(fingerTouches);
  if(keys.length===0){
    var msg=document.getElementById('finger-msg');
    msg.style.fontSize='20px'; msg.style.fontFamily="'Cormorant Garamond',serif"; msg.style.color='#fff';
    msg.textContent='¡Pero poned los dedos! ¡HOMBRE YA!';
    var btn=document.getElementById('finger-start-btn');
    btn.textContent='Reintentar'; btn.onclick=openFinger; btn.style.display='block';
    return;
  }
  var winKey=keys[Math.floor(Math.random()*keys.length)];
  var arena=document.getElementById('finger-arena');
  arena.innerHTML='';
  Object.keys(fingerTouches).forEach(function(k){
    var t=fingerTouches[k]; var win=(k===winKey);
    var dot=document.createElement('div');
    dot.style.cssText='position:absolute;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:all .3s;background:'+t.color+';'
      +(win?'width:88px;height:88px;opacity:1;box-shadow:0 0 32px '+t.color+';'
           :'width:64px;height:64px;opacity:0.2;')
      +'left:'+t.x+'px;top:'+t.y+'px;';
    if(win) dot.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px">★</div>';
    arena.appendChild(dot);
  });
  document.getElementById('finger-msg').textContent='';
  document.getElementById('finger-sub').textContent='';
  var btn=document.getElementById('finger-start-btn');
  btn.textContent='Continuar a la partida →'; btn.style.display='block';
  btn.onclick=goToGame;
}

function goToGame(){
  buildGameTable();
  showScreen('s-game');
  // solo_quede_uno suena 2 segundos después de entrar
  setTimeout(function(){
    var a=new Audio('solo_quede_uno.mp3'); a.volume=0.85;
    a.play().catch(function(){});
  }, 2000);
}

// ═══════ TABLA DE JUEGO ═══════
function buildGameTable(){
  var tbl=document.getElementById('score-table');
  var n=gamePlayers.length;

  // Cabecera
  var head='<thead><tr><th>#</th>';
  gamePlayers.forEach(function(p){ head+='<th>'+p.name+'</th>'; });
  head+='</tr></thead>';

  // Cuerpo
  var body='<tbody>';
  cellOrder=[];
  for(var r=0;r<TOTAL_ROUNDS;r++){
    body+='<tr><td>'+(r+1)+'</td>';
    for(var p=0;p<n;p++){
      var id='c'+r+'_'+p;
      cellOrder.push({row:r,col:p,id:id});
      body+='<td><div class="score-cell" id="'+id+'" data-row="'+r+'" data-col="'+p+'" onclick="activateCell('+r+','+p+')" readonly>'+
        (scoreValues[p][r]||'')+'</div></td>';
    }
    body+='</tr>';
  }

  // Fila totales
  body+='<tr class="tot-row"><td style="font-size:10px;color:var(--gold)">∑</td>';
  for(var p2=0;p2<n;p2++){ body+='<td id="tot'+p2+'" class="tot-cell">0</td>'; }
  body+='</tr></tbody>';

  tbl.innerHTML=head+body;
  updateTable();
}

// ═══════ NUMPAD ═══════
function activateCell(row,col){
  // Quita active anterior
  document.querySelectorAll('.score-cell.active').forEach(function(el){ el.classList.remove('active'); });
  activeCell={row:row,col:col};
  var el=document.getElementById('c'+row+'_'+col);
  if(el){ el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('numpad').style.display='block';
}

function numInput(digit){
  if(!activeCell) return;
  var el=document.getElementById('c'+activeCell.row+'_'+activeCell.col);
  if(!el) return;
  var cur=scoreValues[activeCell.col][activeCell.row]||'';
  if(cur.length<3){ cur+=digit; }
  scoreValues[activeCell.col][activeCell.row]=cur;
  el.textContent=cur;
  updateTable();
}

function numDel(){
  if(!activeCell) return;
  var el=document.getElementById('c'+activeCell.row+'_'+activeCell.col);
  if(!el) return;
  var cur=scoreValues[activeCell.col][activeCell.row]||'';
  cur=cur.slice(0,-1);
  scoreValues[activeCell.col][activeCell.row]=cur;
  el.textContent=cur;
  updateTable();
}

function numNext(){
  if(!activeCell) return;
  // Encuentra la siguiente celda en orden (fila por fila)
  var cur=activeCell;
  var idx=cellOrder.findIndex(function(c){ return c.row===cur.row&&c.col===cur.col; });
  var next=cellOrder[idx+1];
  if(next){ activateCell(next.row,next.col); }
  else{
    // Fin de tabla — cierra teclado
    document.querySelectorAll('.score-cell.active').forEach(function(el){ el.classList.remove('active'); });
    document.getElementById('numpad').style.display='none';
    activeCell=null;
  }
}

// ═══════ ACTUALIZAR TABLA ═══════
function updateTable(){
  var n=gamePlayers.length;
  var totals=gamePlayers.map(function(_,p){
    return scoreValues[p].reduce(function(a,v){ return a+(parseInt(v)||0); },0);
  });
  var minTot=Math.min.apply(null,totals);

  // Totales
  totals.forEach(function(t,p){
    var el=document.getElementById('tot'+p);
    if(el){ el.textContent=t; el.className='tot-cell'+(t===minTot?' leader':''); }
  });

  // Color celdas por ronda
  for(var r=0;r<TOTAL_ROUNDS;r++){
    var vals=[];
    var allFilled=true;
    for(var p=0;p<n;p++){
      var v=scoreValues[p][r];
      if(v===''||v===undefined){ allFilled=false; break; }
      vals.push(parseInt(v)||0);
    }
    for(var p2=0;p2<n;p2++){
      var el=document.getElementById('c'+r+'_'+p2);
      if(!el) continue;
      var isActive=activeCell&&activeCell.row===r&&activeCell.col===p2;
      var classes='score-cell';
      if(isActive){ classes+=' active'; }
      else if(allFilled){
        var v2=parseInt(scoreValues[p2][r])||0;
        var rMin=Math.min.apply(null,vals);
        var rMax=Math.max.apply(null,vals);
        if(v2===rMin){ classes+=' win'; }
        else if(v2===rMax&&rMax!==rMin){ classes+=' lose'; }
      }
      el.className=classes;
    }
  }

  // Ranking
  var ranked=totals.map(function(t,i){return{name:gamePlayers[i].name,tot:t};}).sort(function(a,b){return a.tot-b.tot;});
  var leader=ranked[0].tot;
  document.getElementById('rank-body').innerHTML=ranked.map(function(p,i){
    var first=(i===0);
    var gap=first?'—':'+'+( p.tot-leader);
    return '<tr>'
      +'<td style="color:var(--w30)">'+(i+1)+'</td>'
      +'<td style="text-align:left;color:'+(first?'var(--gold2)':'var(--w)')+'">'+(first?'★ ':'')+p.name+'</td>'
      +'<td style="color:'+(first?'var(--gold2)':'var(--w60)')+'">'+p.tot+'</td>'
      +'<td style="font-size:11px;color:'+(first?'var(--w30)':'var(--redtext)')+'">'+gap+'</td>'
      +'</tr>';
  }).join('');
}

function confirmLeave(){
  if(confirm('¿Salir de la partida? Se perderán los datos.')){
    document.getElementById('numpad').style.display='none';
    activeCell=null;
    screenHistory=['s-home'];
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
    document.getElementById('s-home').classList.add('active');
  }
}

// Cerrar numpad al tocar fuera
document.addEventListener('touchstart',function(e){
  var numpad=document.getElementById('numpad');
  if(!numpad||numpad.style.display==='none') return;
  if(numpad.contains(e.target)) return;
  var isCell=false;
  document.querySelectorAll('.score-cell').forEach(function(c){ if(c===e.target||c.contains(e.target)) isCell=true; });
  if(!isCell){
    document.querySelectorAll('.score-cell.active').forEach(function(el){el.classList.remove('active');});
    numpad.style.display='none';
    activeCell=null;
    updateTable();
  }
},{passive:true});
</script>
</body>
</html>
